
<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <title>タイマー</title>
    <style>
      :root {
        --accent: #4c9a95;       /* アクセントカラー（メイン） */
        --accent-hover: #6ab3ac; /* アクセントカラー（マウスカーソルをあわせたときの色） */
      }
      body {
        margin: 0;
        background: transparent;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        font-family: Arial;
        color: white;
      }
      .container {
        position: relative;
        width: 300px;
        height: 300px;
      }
      svg {
        width: 300px;
        height: 300px;
        transform: rotate(-90deg);
      }
      circle {
        fill: none;
        stroke-width: 12;
      }
      .bg {
        stroke: rgba(255,255,255,0.2);
      }
      .progress {
        stroke: var(--accent);
        stroke-linecap: round;
        filter: drop-shadow(0 0 10px var(--accent));
      }
      #time {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-size: 60px;
        line-height: 1;
        margin: 0;
        text-shadow:
          0 0 10px var(--accent),
          0 0 20px var(--accent);
      }
      .inputs {
        margin-top: 20px;
        text-align: center;
      }
      input {
        width: 70px;
        font-size: 22px;
        padding: 8px;
        margin: 5px;
        text-align: center;
        background: rgba(0,0,0,0.6);
        border: 2px solid var(--accent);
        border-radius: 8px;
        color: white;
        box-shadow: 0 0 5px var(--accent);
      }
      button {
        font-size: 18px;
        padding: 8px 0;
        margin: 5px;
        width: 110px;
        border: none;
        border-radius: 8px;
        background: var(--accent);
        color: black;
        font-weight: bold;
        cursor: pointer;
      }
      button:hover {
        background: var(--accent-hover);
      }
    </style>
  </head>
  <body>
    <audio id="beepSound" src="beep.wav" preload="auto"></audio>
    <div class="container">
      <svg viewBox="0 0 300 300">
        <circle class="bg" cx="150" cy="150" r="120"/>
        <circle class="progress" cx="150" cy="150" r="120" stroke-dasharray="753.98" stroke-dashoffset="753.98"/>
      </svg>
      <div id="time">00:00</div>
      <div class="inputs">
        <input id="min" type="number" placeholder="分" min="0"> <span style="color:var(--accent);">分</span>
        <input id="sec" type="number" placeholder="秒" min="0" max="59"> <span style="color:var(--accent);">秒</span>
      </div>
      <div style="text-align:center; margin-top:10px;">
        <button id="startBtn">START</button>
        <button id="stopBtn">STOP</button>
        <button id="resetBtn">RESET</button>
      </div>
      <div id="inputMsg" style="text-align:center; margin-top:8px; font-size:13px; color:var(--accent); text-shadow:0 0 6px var(--accent); min-height:1.4em;"></div>
    </div>
    <script>
      document.querySelectorAll('input[type="number"]').forEach(function(el) {
        el.addEventListener('keydown', function(e) {
          if (e.key === '-' || e.key === 'e' || e.key === '+') e.preventDefault();
        });
        el.addEventListener('input', function() {
          if (this.value < 0) this.value = 0;
          if (this.id === 'sec' && this.value > 59) this.value = 59;
        });
      });

      // --- 状態管理 ---
      const STATE_IDLE = 'idle';
      const STATE_RUNNING = 'running';
      const STATE_PAUSED = 'paused';
      let timerState = STATE_IDLE;

      let totalTime = 0;
      let remaining = 0;
      let remainingAtStart = 0;
      let startAt = null;
      let timer = null;

      const circle = document.querySelector(".progress");
      const circumference = 2 * Math.PI * 120;
      circle.setAttribute('stroke-dasharray', circumference);

      // --- ビープ音（beep.wav 優先、なければ Web Audio API フォールバック） ---
      function playBeepFallback() {
        try {
          const ctx = new (window.AudioContext || window.webkitAudioContext)();
          const oscillator = ctx.createOscillator();
          const gain = ctx.createGain();
          oscillator.type = 'square';
          oscillator.frequency.value = 880;
          gain.gain.value = 0.3;
          oscillator.connect(gain);
          gain.connect(ctx.destination);
          oscillator.start();
          oscillator.stop(ctx.currentTime + 1);
          oscillator.onended = function() { ctx.close(); };
        } catch (e) { /* Audio API 未対応環境では無視 */ }
      }

      function playBeep() {
        const audio = document.getElementById("beepSound");
        audio.currentTime = 0;
        audio.play().catch(function() {
          playBeepFallback();
        });
      }

      function updateDisplay() {
        let m = Math.floor(remaining / 60);
        let s = remaining % 60;
        document.getElementById("time").textContent = String(m).padStart(2, "0") + ":" + String(s).padStart(2, "0");
        let progress = totalTime ? remaining / totalTime : 0;
        circle.style.strokeDashoffset = circumference * (1 - progress);
      }

      function setInputsDisabled(disabled) {
        document.getElementById("min").disabled = disabled;
        document.getElementById("sec").disabled = disabled;
        document.getElementById("inputMsg").textContent = disabled
          ? "時間を変更するときは RESET してください。"
          : "";
      }

      function updateStartButton() {
        document.getElementById("startBtn").textContent =
          timerState === STATE_IDLE ? "START" : "CONTINUE";
      }

      function tick() {
        const elapsed = Math.floor((Date.now() - startAt) / 1000);
        remaining = Math.max(remainingAtStart - elapsed, 0);
        updateDisplay();
        if (remaining <= 0) {
          clearInterval(timer);
          timer = null;
          timerState = STATE_IDLE;
          playBeep();
          setInputsDisabled(false);
          updateStartButton();
        }
      }

      function startTimer() {
        if (timerState !== STATE_IDLE) return;
        let m = parseInt(document.getElementById("min").value, 10) || 0;
        let s = parseInt(document.getElementById("sec").value, 10) || 0;
        s = Math.min(s, 59);
        totalTime = m * 60 + s;
        if (totalTime === 0) return;
        if (timer) { clearInterval(timer); timer = null; }
        remaining = totalTime;
        remainingAtStart = remaining;
        startAt = Date.now();
        timerState = STATE_RUNNING;
        setInputsDisabled(true);
        updateStartButton();
        updateDisplay();
        timer = setInterval(tick, 200);
      }

      function continueTimer() {
        if (timerState !== STATE_PAUSED) return;
        if (remaining <= 0) return;
        remainingAtStart = remaining;
        startAt = Date.now();
        timerState = STATE_RUNNING;
        timer = setInterval(tick, 200);
      }

      function stopTimer() {
        if (timerState !== STATE_RUNNING) return;
        clearInterval(timer);
        timer = null;
        timerState = STATE_PAUSED;
      }

      function resetTimer() {
        if (timer) {
          clearInterval(timer);
          timer = null;
        }
        totalTime = 0;
        remaining = 0;
        timerState = STATE_IDLE;
        setInputsDisabled(false);
        updateStartButton();
        updateDisplay();
      }

      document.getElementById("startBtn").addEventListener("click", function() {
        if (timerState === STATE_PAUSED) {
          continueTimer();
        } else {
          startTimer();
        }
      });
      document.getElementById("stopBtn").addEventListener("click", stopTimer);
      document.getElementById("resetBtn").addEventListener("click", resetTimer);
    </script>
  </body>
</html>
